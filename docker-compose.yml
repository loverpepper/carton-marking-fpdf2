# 直接强制指定纯英文项目名，无视任何中文文件夹！
name: carton-marking-project
services:
  carton-marking:
    build: .
    container_name: carton-marking-app
    ports:
      - "8501:8501"
    environment:
      - TZ=Asia/Shanghai  # 强制容器使用北京时间
      - STATS_PASSWORD=${STATS_PASSWORD:-admin2026}  # 设置查看统计数据的访问密码，从宿主机环境变量读取
    env_file:
      - .env  # 生产环境专属配置，该文件请永远不要提交到 Git
    volumes:
      - stats_data:/app/data  # 改用 Docker 命名卷，完全脱离 Git 目录，更新代码/重启绝不会覆盖数据
    restart: always # 遇到崩溃会自动重启！
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 1G

volumes:
  stats_data:
    name: carton_stats_data